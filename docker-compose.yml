services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      CIP_DATABASE_PATH: /data/analysis.db
      CIP_CORS_ORIGINS: '["http://localhost:3000"]'
    ports:
      - "8000:8000"
    volumes:
      - analysis-data:/data

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      - backend
    ports:
      - "3000:80"

  redis:
    image: redis:7-alpine
    profiles: ["cache"]
    ports:
      - "6379:6379"

volumes:
  analysis-data:

